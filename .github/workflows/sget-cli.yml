name: sget CLI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Setup vcpkg 
    - name: Clone and Setup vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"
        cd "$GITHUB_WORKSPACE/vcpkg"
        
        # Safely fetch and pin the exact release baseline commit
        git fetch origin 501db0f17ef6df184fcdbfcd0f87a86bbafafbc3 --depth=1
        git checkout FETCH_HEAD
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./bootstrap-vcpkg.bat
        else
          ./bootstrap-vcpkg.sh
        fi

    # 2. Installing Dependencies
    - name: Install libcurl
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          "$GITHUB_WORKSPACE/vcpkg/vcpkg" install curl:x64-windows-release
        else
          "$GITHUB_WORKSPACE/vcpkg/vcpkg" install curl
        fi

    # 3. Configure CMake
    - name: Configure CMake (CLI Project)
      shell: bash
      run: |
        TRIPLET="x64-linux"
        if [ "$RUNNER_OS" == "Windows" ]; then
          TRIPLET="x64-windows-release"
        fi
        
        cmake -B "$GITHUB_WORKSPACE/cli/build" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=$TRIPLET \
          -S "$GITHUB_WORKSPACE/cli"

    # 4. Compile the binary
    - name: Build C++ Binary
      run: cmake --build "${{ github.workspace }}/cli/build" --config ${{ matrix.build_type }}
