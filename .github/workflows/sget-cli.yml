name: sget CLI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Manually clone and bootstrap vcpkg 
    - name: Clone and Setup vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
        cd ${{ github.workspace }}/vcpkg
        # Pin to a reliable stable snapshot release
        git checkout 501db0f17ef6df184fcdbfcd0f87a86bbafafbc3
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./bootstrap-vcpkg.bat
        else
          ./bootstrap-vcpkg.sh
        fi

    # 2. Compile curl dependency 
    - name: Install libcurl
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ${{ github.workspace }}/vcpkg/vcpkg install curl:x64-windows-release
        else
          ${{ github.workspace }}/vcpkg/vcpkg install curl
        fi

    # 3. Configure CMake 
    - name: Configure CMake (CLI Project)
      shell: bash
      run: |
        TRIPLET="x64-linux"
        if [ "$RUNNER_OS" == "Windows" ]; then
          TRIPLET="x64-windows-release"
        fi
        
        cmake -B ${{ github.workspace }}/cli/build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=$TRIPLET \
          -S ${{ github.workspace }}/cli

    # 4. Compile the final binary
    - name: Build C++ Binary
      run: cmake --build ${{ github.workspace }}/cli/build --config ${{ matrix.build_type }}
